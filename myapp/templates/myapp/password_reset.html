{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Reset | Tasty Bites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
  <style>
    body{font-family:"Lato",sans-serif;}
    .auth-page{min-height:100vh;display:grid;place-items:center;padding:40px 6vw;background:#EFEFEF;}
    .auth-card{width:min(520px,92vw);background:#fff;border:1px solid rgba(195,196,196,.55);border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,.12);padding:22px;}
    .auth-title{margin:0 0 6px;text-align:center;font-weight:800;}
    .auth-subtitle{margin:0 0 14px;text-align:center;color:#6B7280;font-size:.95rem;}
    .auth-input{width:100%;height:44px;border-radius:12px;border:1px solid rgba(195,196,196,.75);outline:none;padding:0 12px;background:#fff;}
    .auth-errors{margin:10px 0 0;color:#C81118;font-size:.88rem;}
    .row{margin-top:12px;}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2 class="auth-title">Reset your password</h2>
      <p class="auth-subtitle">Enter your email and we’ll send you a reset link.</p>

      <form method="post" novalidate>
        {% csrf_token %}
        {% if form.non_field_errors %}<div class="auth-errors">{{ form.non_field_errors }}</div>{% endif %}
        <div class="row">
          {{ form.email }}
          {% if form.email.errors %}<div class="auth-errors">{{ form.email.errors }}</div>{% endif %}
        </div>
        <div class="row" style="display:flex;justify-content:center;margin-top:16px;">
          <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.querySelectorAll('input').forEach((el)=>el.classList.add('auth-input'));
  </script>
</body>
</html>
