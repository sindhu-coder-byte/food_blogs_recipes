{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Reset | Tasty Bites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
  <style>
    body{font-family:"Lato",sans-serif;}
    .auth-page{min-height:100vh;display:grid;place-items:center;padding:40px 6vw;background:#EFEFEF;}
    .auth-card{width:min(520px,92vw);background:#fff;border:1px solid rgba(195,196,196,.55);border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,.12);padding:22px;}
body{
  font-family:"Lato",sans-serif;
  margin:0;
}

/* Page Container */
.auth-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 6vw;
  background:#EFEFEF;
}

/* Card */
.auth-card{
  width:100%;
  max-width:520px;
  background:#fff;
  border:1px solid rgba(195,196,196,.55);
  border-radius:18px;
  box-shadow:0 18px 45px rgba(0,0,0,.12);
  padding:22px;
}

/* Title */
.auth-title{
  margin:0 0 6px;
  text-align:center;
  font-weight:800;
  font-size:1.6rem;
}

/* Subtitle */
.auth-subtitle{
  margin:0 0 14px;
  text-align:center;
  color:#6B7280;
  font-size:.95rem;
}

/* Input */
.auth-input{
  width:100%;
  height:44px;
  border-radius:12px;
  border:1px solid rgba(195,196,196,.75);
  outline:none;
  padding:0 12px;
  background:#fff;
  box-sizing:border-box;
  font-size:0.95rem;
}

/* Error */
.auth-errors{
  margin:10px 0 0;
  color:#C81118;
  font-size:.88rem;
}

/* Row spacing */
.row{
  margin-top:12px;
}

/* Button */
.auth-btn{
  width:100%;
  height:44px;
  border:none;
  border-radius:12px;
  background:#455a64;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:14px;
}

/* ---------- MOBILE (≤ 480px) ---------- */
@media (max-width:480px){

  .auth-page{
    padding:20px 4vw;
  }

  .auth-card{
    padding:18px;
    border-radius:14px;
  }

  .auth-title{
    font-size:1.3rem;
  }

  .auth-input{
    height:40px;
    font-size:0.9rem;
  }

  .auth-btn{
    height:40px;
  }
}

/* ---------- TABLET (481px – 768px) ---------- */
@media (min-width:481px) and (max-width:768px){

  .auth-card{
    max-width:480px;
  }

  .auth-title{
    font-size:1.5rem;
  }
}

/* ---------- LARGE SCREENS (≥ 1200px) ---------- */
@media (min-width:1200px){

  .auth-card{
    max-width:540px;
  }
}
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2 class="auth-title">Reset your password</h2>
      <p class="auth-subtitle">Enter your email and we’ll send you a reset link.</p>

      <form method="post" novalidate>
  {% csrf_token %}

  <div class="row">
    <input 
      type="email" 
      name="email" 
      placeholder="Enter your email address"
      class="auth-input"
      required>
  </div>

  <div class="row" style="display:flex;justify-content:center;margin-top:16px;">
    <button type="submit" class="btn btn-primary">
      Send Reset Link
    </button>
  </div>

</form>
    </div>
  </div>

</body>
</html>
