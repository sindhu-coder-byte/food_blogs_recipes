{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Sent | Tasty Bites</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
  <style>
    body{font-family:"Lato",sans-serif;}
    .wrap{min-height:100vh;display:grid;place-items:center;padding:40px 6vw;background:#EFEFEF;}
    .card{width:min(520px,92vw);background:#fff;border:1px solid rgba(195,196,196,.55);border-radius:18px;box-shadow:0 18px 45px rgba(0,0,0,.12);padding:22px;text-align:center;}
    .title{margin:0 0 8px;font-weight:800;}
    .text{margin:0 0 14px;color:#6B7280;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 class="title">Check your email</h2>
      <p class="text">If an account exists for that email, we sent a password reset link.</p>
      <a class="btn btn-primary" href="{% url 'login' %}">Back to Login</a>
    </div>
  </div>
</body>
</html>
